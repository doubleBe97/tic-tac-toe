<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-pink: #ff2d95;
    --neon-cyan: #00f0ff;
    --neon-lime: #39ff14;
    --dark: #0a0a0a;
    --surface: #111118;
    --grid-line: #1e1e2e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(255,45,149,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(0,240,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 100%, rgba(57,255,20,0.04) 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  h1 {
    font-family: 'Press Start 2P', cursive;
    font-size: 2rem;
    color: var(--neon-cyan);
    text-shadow:
      0 0 10px rgba(0,240,255,0.6),
      0 0 40px rgba(0,240,255,0.3),
      0 0 80px rgba(0,240,255,0.15);
    letter-spacing: 4px;
    margin-bottom: 8px;
    animation: flicker 4s infinite alternate;
  }

  @keyframes flicker {
    0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
    20%, 24%, 55% { opacity: 0.85; }
  }

  .status {
    font-size: 1.1rem;
    color: #8888aa;
    margin-bottom: 2rem;
    min-height: 1.5em;
    letter-spacing: 2px;
    transition: color 0.3s;
  }

  .status.win { color: var(--neon-lime); text-shadow: 0 0 20px rgba(57,255,20,0.5); }
  .status.draw { color: var(--neon-pink); }
  .status.turn-x { color: var(--neon-cyan); }
  .status.turn-o { color: var(--neon-pink); }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    width: 320px;
    height: 320px;
    margin: 0 auto 2rem;
    background: var(--grid-line);
    border: 3px solid var(--grid-line);
    border-radius: 4px;
    position: relative;
    box-shadow:
      0 0 30px rgba(0,240,255,0.08),
      0 0 60px rgba(255,45,149,0.05),
      inset 0 0 30px rgba(0,0,0,0.3);
  }

  .cell {
    background: var(--surface);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', cursive;
    font-size: 2.2rem;
    transition: all 0.15s ease;
    position: relative;
    color: transparent;
  }

  .cell:hover:not(.taken) {
    background: #1a1a28;
    box-shadow: inset 0 0 20px rgba(0,240,255,0.08);
  }

  .cell.taken { cursor: default; }

  .cell.x-mark {
    color: var(--neon-cyan);
    text-shadow: 0 0 15px rgba(0,240,255,0.7), 0 0 35px rgba(0,240,255,0.3);
    animation: pop-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cell.o-mark {
    color: var(--neon-pink);
    text-shadow: 0 0 15px rgba(255,45,149,0.7), 0 0 35px rgba(255,45,149,0.3);
    animation: pop-in 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cell.win-cell {
    animation: win-pulse 0.5s ease-in-out infinite alternate;
  }

  .cell.win-cell.x-mark {
    text-shadow: 0 0 20px rgba(0,240,255,1), 0 0 50px rgba(0,240,255,0.6), 0 0 80px rgba(0,240,255,0.3);
  }

  .cell.win-cell.o-mark {
    text-shadow: 0 0 20px rgba(255,45,149,1), 0 0 50px rgba(255,45,149,0.6), 0 0 80px rgba(255,45,149,0.3);
  }

  @keyframes pop-in {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  @keyframes win-pulse {
    0% { transform: scale(1); }
    100% { transform: scale(1.08); }
  }

  .reset-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 3px;
    background: transparent;
    color: #666688;
    border: 1px solid #2a2a3e;
    padding: 12px 32px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .reset-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .reset-btn:hover {
    color: #fff;
    border-color: transparent;
    box-shadow: 0 0 30px rgba(0,240,255,0.2), 0 0 60px rgba(255,45,149,0.1);
  }

  .reset-btn:hover::before { opacity: 1; }

  .reset-btn span {
    position: relative;
    z-index: 1;
  }

  /* Glitch on win */
  @keyframes glitch {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(2px, -1px); }
    60% { transform: translate(-1px, -2px); }
    80% { transform: translate(1px, 1px); }
  }

  .glitch { animation: glitch 0.3s ease; }

  /* Scoreboard */
  .scores {
    display: flex;
    gap: 2rem;
    justify-content: center;
    margin-bottom: 1.5rem;
    font-size: 0.75rem;
    letter-spacing: 2px;
  }

  .score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .score-label {
    color: #555;
    text-transform: uppercase;
    font-size: 0.65rem;
  }

  .score-value {
    font-family: 'Press Start 2P', cursive;
    font-size: 1rem;
  }

  .score-x .score-value { color: var(--neon-cyan); }
  .score-o .score-value { color: var(--neon-pink); }
  .score-draw .score-value { color: #555577; }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 60px;
    height: 60px;
    border-color: #1e1e32;
    border-style: solid;
    pointer-events: none;
    z-index: 0;
  }

  .corner-tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">
  <h1>TIC TAC TOE</h1>

  <div class="scores">
    <div class="score-item score-x">
      <span class="score-label">X</span>
      <span class="score-value" id="scoreX">0</span>
    </div>
    <div class="score-item score-draw">
      <span class="score-label">Draw</span>
      <span class="score-value" id="scoreDraw">0</span>
    </div>
    <div class="score-item score-o">
      <span class="score-label">O</span>
      <span class="score-value" id="scoreO">0</span>
    </div>
  </div>

  <div class="status turn-x" id="status">X'S TURN</div>

  <div class="board" id="board">
    <button class="cell" data-idx="0"></button>
    <button class="cell" data-idx="1"></button>
    <button class="cell" data-idx="2"></button>
    <button class="cell" data-idx="3"></button>
    <button class="cell" data-idx="4"></button>
    <button class="cell" data-idx="5"></button>
    <button class="cell" data-idx="6"></button>
    <button class="cell" data-idx="7"></button>
    <button class="cell" data-idx="8"></button>
  </div>

  <button class="reset-btn" id="resetBtn"><span>NEW GAME</span></button>
</div>

<script>
  const board = ['', '', '', '', '', '', '', '', ''];
  let currentPlayer = 'X';
  let gameOver = false;

  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  const scores = { X: 0, O: 0, draw: 0 };

  const statusEl = document.getElementById('status');
  const boardEl = document.getElementById('board');
  const cells = boardEl.querySelectorAll('.cell');

  function updateStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + cls;
  }

  function checkWin() {
    for (const [a,b,c] of wins) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], combo: [a,b,c] };
      }
    }
    if (board.every(c => c)) return { winner: 'draw', combo: [] };
    return null;
  }

  function playSound(mark) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g);
    g.connect(ctx.destination);
    g.gain.setValueAtTime(0.06, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.type = mark === 'X' ? 'square' : 'sine';
    o.frequency.setValueAtTime(mark === 'X' ? 440 : 660, ctx.currentTime);
    o.start();
    o.stop(ctx.currentTime + 0.12);
  }

  function handleClick(e) {
    const cell = e.target;
    if (!cell.classList.contains('cell') || cell.classList.contains('taken') || gameOver) return;

    const idx = +cell.dataset.idx;
    board[idx] = currentPlayer;
    cell.textContent = currentPlayer;
    cell.classList.add('taken', currentPlayer === 'X' ? 'x-mark' : 'o-mark');

    try { playSound(currentPlayer); } catch (_) {}

    const result = checkWin();

    if (result) {
      gameOver = true;
      if (result.winner === 'draw') {
        scores.draw++;
        document.getElementById('scoreDraw').textContent = scores.draw;
        updateStatus('DRAW', 'draw');
        boardEl.classList.add('glitch');
        setTimeout(() => boardEl.classList.remove('glitch'), 300);
      } else {
        scores[result.winner]++;
        document.getElementById('score' + result.winner).textContent = scores[result.winner];
        updateStatus(result.winner + ' WINS!', 'win');
        result.combo.forEach(i => {
          cells[i].classList.add('win-cell');
        });
      }
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    updateStatus(currentPlayer + "'S TURN", currentPlayer === 'X' ? 'turn-x' : 'turn-o');
  }

  function reset() {
    board.fill('');
    currentPlayer = 'X';
    gameOver = false;
    cells.forEach(c => {
      c.textContent = '';
      c.className = 'cell';
    });
    updateStatus("X'S TURN", 'turn-x');
  }

  boardEl.addEventListener('click', handleClick);
  document.getElementById('resetBtn').addEventListener('click', reset);
</script>
</body>
</html>
